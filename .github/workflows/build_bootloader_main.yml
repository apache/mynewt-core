name: Build check

on:
  push:
    branches:
      - master
  schedule:
    - cron: 42 0 * * *

jobs:
  bootloader:
    name: Build bootloader (main)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 'stable'
      - uses: carlosperate/arm-none-eabi-gcc-action@v1.12.3
        with:
          release: '15.2.Rel1'
      - name: Install Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
             sudo apt-get update
             sudo apt-get install -y gcc-multilib
      - name: Install newt
        run: |
             go version
             go install mynewt.apache.org/newt/newt@latest
      - name: Setup project
        shell: bash
        run: |
             newt new build
             cp -f .github/project.yml build/project.yml
             cd build
             newt upgrade --shallow=1
             cd ..
      - name: Build bootloader (main branch)
        shell: bash
        run: |
             cd build
             cd repos/mcuboot
             git fetch origin main:main
             git checkout main
             cd ../..
             bash ../.github/test_build_bootloader_main.sh
