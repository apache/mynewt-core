        description: Enable support for socket API
        value: 1
    WIZNET_CONF:
        description: Enable default configuration file
        value: 1
    WIZNET_APP:
        description: Enable loopback code
        value: 1
    WIZNET_DNS:
        description: Enable loopback code
        value: 1
    WIZNET_MQTT:
        description: Enable loopback code
        value: 1
    WIZNET_SNMP:
        description: Enable loopback code
        value: 1
    WIZNET_SNTP:
        description: Enable loopback code
        value: 1
    WIZNET_TFTP:
        description: Enable loopback code
        value: 0
