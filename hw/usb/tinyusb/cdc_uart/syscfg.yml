syscfg.defs:
    CDC_UART_UART_DEV_NAME:
        description: Device name of UART device for CDC_UART"
        value: '"uart0"'

    CDC_UART_RX_FIFO_SIZE:
        description: >
            RX FIFO size. FIFO that keeps data received over UART,
            before they are transported out of USB.
        value: 2048

    CDC_UART_TX_FIFO_SIZE:
        description: >
            TX FIFO size. FIFO that keeps data received from USB,
            before they are transported out of UART.
        value: 2048

    CDC_UART_TX_LED_PIN:
        description: TX LED pin that.
        value: -1

    CDC_UART_TX_LED_ON_VALUE:
        description: Value set to CDC_UART_TX_LED_PIN to lit LED.
        value: 1

    CDC_UART_RX_LED_PIN:
        description: RX LED pin that.
        value: -1

    CDC_UART_RX_LED_ON_VALUE:
        description: Value set to USB2UART_RX_LED_PIN to lit LED.
        value: 1

syscfg.vals:
    USBD_CDC: 1
