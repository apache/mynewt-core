syscfg.defs:

syscfg.vals:
    STM32_FLASH_SIZE_KB: 2048
    MCU_RAM_START: 0x20000000
    MCU_RAM_SIZE: 640K
    MCU_TARGET: STM32H563
    STM32_CLOCK_VOLTAGESCALING_CONFIG: 'PWR_REGULATOR_VOLTAGE_SCALE0'
    STM32_CLOCK_HSI: 1
    STM32_CLOCK_HSIDIV: LL_RCC_HSI_DIV_1
    STM32_CLOCK_HSE: 1
    # 8MHz From ST-LINK
    STM32_CLOCK_HSE_BYPASS: 1
    STM32_CLOCK_PLL1_SOURCE: LL_RCC_PLL1SOURCE_HSE
    STM32_CLOCK_PLL1_PLLM: 4 # 8 MHZ / 4 = 2 MHz implies RCC_PLL1_VCIRANGE_1
    STM32_CLOCK_PLL1_PLLN: 250 # VCO = 2 MHz * 250 = 500 MHz
    STM32_CLOCK_PLL1_PLLP: 2 # PLLP = 250 MHz
    STM32_CLOCK_PLL1_PLLQ: 2 # PLPQ = 250 MHz
    STM32_CLOCK_PLL1_PLLR: 2 # PLPQ = 250 MHz
    STM32_CLOCK_PLL1_RGE: 'RCC_PLL1_VCIRANGE_1'
    STM32_CLOCK_AHB_DIVIDER: 'RCC_SYSCLK_DIV1'
    STM32_CLOCK_APB1_DIVIDER: 'RCC_HCLK_DIV1'
    STM32_CLOCK_APB2_DIVIDER: 'RCC_HCLK_DIV1'
    STM32_CLOCK_APB3_DIVIDER: 'RCC_HCLK_DIV1'
    STM32_FLASH_LATENCY: 'FLASH_LATENCY_6'
    STM32_ENABLE_ICACHE: 1
    WATCHDOG_INTERVAL: 28000
    UART_0_PIN_TX: 'MCU_GPIO_PORTD(8)'
    UART_0_PIN_RX: 'MCU_GPIO_PORTD(9)'
    SPI_0_PIN_SS: 'MCU_GPIO_PORTD(14)'
    SPI_0_PIN_SCK: ARDUINO_PIN_SCK
    SPI_0_PIN_MISO: ARDUINO_PIN_MISO
    SPI_0_PIN_MOSI: ARDUINO_PIN_MOSI
    I2C_0_PIN_SCL: 'MCU_GPIO_PORTB(8)'
    I2C_0_PIN_SDA: 'MCU_GPIO_PORTB(9)'
    I2C_1_PIN_SCL: 'MCU_GPIO_PORTF(1)'
    I2C_1_PIN_SDA: 'MCU_GPIO_PORTF(0)'
    I2C_2_PIN_SCL: 'MCU_GPIO_PORTA(8)'
    I2C_2_PIN_SDA: 'MCU_GPIO_PORTC(9)'
    I2C_3_PIN_SCL: 'MCU_GPIO_PORTD(12)'
    I2C_3_PIN_SDA: 'MCU_GPIO_PORTD(13)'
    TIMER_0_TIM: 'TIM12'
    TIMER_1_TIM: 'TIM13'
    TIMER_2_TIM: 'TIM14'

    # Flasher parameters
    MYNEWT_DOWNLOADER: stm32_programmer_cli
    MYNEWT_DOWNLOADER_MFG_IMAGE_FLASH_OFFSET: 0x08000000
    JLINK_TARGET: STM32H563ZI
